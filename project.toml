[project]
name = "okra-assistant"
display_name = "okra assistant"
version = "0.2.0"
status = "local-production"
created_at = "2026-03-10"
owner = "qmq"
language = "zh-CN"
platform = "windows-local"
entry_desktop = "F:\\okra_assistant\\app\\desktop_app.py"
entry_intraday = "F:\\okra_assistant\\scripts\\run_daily_pipeline.py"
entry_nightly = "F:\\okra_assistant\\scripts\\run_daily_pipeline.py"

[paths]
project_root = "F:\\okra_assistant"
desktop_shortcut = "C:\\Users\\qmq\\Desktop\\okra的小助手.lnk"
desktop_launcher = "F:\\okra_assistant\\run_desktop_app.ps1"
backup_dir = "F:\\okra_assistant\\backups"

[runtime]
python_executable = ""

[features]
multiagent = true
desktop_shell = true
trade_journal = true
portfolio_autoupdate = true
night_review = true
review_memory = true
realtime_estimate = true
intraday_proxy = true

[backup]
exclude_cache = true
exclude_temp = true
exclude_logs = false
compress_format = "zip"
